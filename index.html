<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Readiness — Legal</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
html{background:#080b0a}
body{margin:0;min-height:100vh;
  background-image:radial-gradient(900px 520px at 50% -12%, rgba(51,227,163,.16), rgba(8,11,10,0) 62%);
  color:#aab4b1;font:16px/1.6 -apple-system,BlinkMacSystemFont,"SF Pro Rounded","Segoe UI",Roboto,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:64px 22px}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:24px}
.mark{width:46px;height:46px;border-radius:50%;flex:none;position:relative;
  background:linear-gradient(135deg,#33e3a3,#1cb0b8);box-shadow:0 6px 20px rgba(51,227,163,.35)}
.mark::after{content:"";position:absolute;inset:10px;border:2px dashed rgba(255,255,255,.92);border-radius:50%}
h1{font-size:30px;font-weight:800;color:#fff;letter-spacing:-.02em;margin:0}
.sub{color:#76817e;margin:0 0 28px}
.grid{display:grid;gap:12px}
a.card{display:block;padding:16px 18px;border:1px solid rgba(255,255,255,.09);border-radius:14px;
  background:rgba(255,255,255,.04);text-decoration:none;color:#fff;font-weight:600;transition:border-color .15s}
a.card span{display:block;font-weight:400;color:#76817e;font-size:14px;margin-top:2px}
a.card:hover{border-color:#33e3a3}
</style>
</head>
<body>
<div class="wrap">
<header class="brand"><div class="mark"></div><h1>Readiness</h1></header>
<p class="sub">Legal documents</p>
<div class="grid">
<a class="card" href="privacy-en.html">Privacy Policy <span>English</span></a>
<a class="card" href="privacy-ru.html">Политика конфиденциальности <span>Русский</span></a>
<a class="card" href="terms-en.html">Terms of Use <span>English</span></a>
<a class="card" href="terms-ru.html">Условия использования <span>Русский</span></a>
</div>
</div>
</body>
</html>
